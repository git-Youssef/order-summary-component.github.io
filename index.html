<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/imgs/favicon-32x32.png">
    <link rel="stylesheet" href="./assets/css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">    <title>Frontend Mentor | Order summary card</title>

</head>

<body>


    <div class="order_card">

        <section>
            <figure>
                <img src="./assets/imgs/illustration-hero.svg" alt="hero">
            </figure>
            <div class="content">
                <h3>Order Summary</h3>
                <p>You can now listen to millions of songs , audiobooks and podcasts on any device anywhere you like !
                </p>
                <div class="choose_plan">
                    <div class="left">
                        <img src="./assets/imgs/icon-music.svg" alt="music">
                        <div>
                            <h4>Annual Plan</h4>
                            <span>$59.99/year</span>
                        </div>
                    </div>
                    <div class="right">
                        <a href="#">Change</a>
                    </div>
                </div>
                <div class="buttons">
                    <a href="#" class="payment">Proceed to Payment</a>
                    <a href="#" class="cancel_ord">Cancel Order</a>
                </div>
               
            </div>
        </section>

    </div>

</body>

</html>
